<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Securely Signed In</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dashboard-body">

  <div class="dashboard-wrapper">
    <div id="content" style="display:none;">
      <div class="welcome-box">
        <h2 id="welcomeMsg">Welcome back.</h2>
        <p>You are securely signed in and authenticated.</p>
        <p style="font-size: 0.9rem; color: #999; margin-top: 15px;">Redirecting to news feed in <span id="countdown">5</span>s...</p>
      </div>

      <div class="info-grid">
        <div class="info-card">
          <div class="label">Status</div>
          <div class="value">Active</div>
        </div>
        <div class="info-card">
          <div class="label">Session</div>
          <div class="value">Valid</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (async () => {
      try {
        const res = await fetch('/api/dashboard', { credentials: 'same-origin' });

        if (!res.ok) {
          window.location.href = '/login.html';
          return;
        }

        const data = await res.json();
        document.getElementById('welcomeMsg').textContent = `Welcome back, ${data.username}.`;
        document.getElementById('content').style.display = 'block';

        // Auto-redirect to news after 5 seconds
        let count = 5;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
          count--;
          countdownEl.textContent = count;
          if (count <= 0) {
            clearInterval(timer);
            window.location.href = '/news.html';
          }
        }, 1000);
      } catch (err) {
        window.location.href = '/login.html';
      }
    })();
  </script>
</body>
</html>
